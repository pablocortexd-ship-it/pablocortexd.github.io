<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title | default: site.title }}</title>
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
    <header>
        <div class="header-container">
            <div class="logo-section">
                <img src="{{ '/assets/images/logo.png' | relative_url }}" alt="Hecha la ley, hecha la trampa" class="logo">
            </div>
            <div class="title-section">
                <h1><a href="{{ '/' | relative_url }}">{{ site.title }}</a></h1>
                <p class="subtitle">{{ site.description }}</p>
            </div>
        </div>
        <nav>
            <a href="{{ '/' | relative_url }}">Inicio</a>
            <a href="{{ '/tags.html' | relative_url }}">Archivo</a>
        </nav>
    </header>

    <main class="container">
        {{ content }}
    </main>

    <footer>
        <p>&copy; 2026 {{ site.title }}. Todos los derechos reservados.</p>
    </footer>
</body>
</html>
